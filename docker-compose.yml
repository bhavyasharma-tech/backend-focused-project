services:

  app:
    build: .
    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

    environment:
      DB_HOST: postgres
      DB_NAME: learninghub
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: learninghub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  redis:
    image: redis:latest

    ports:
      - "6379:6379"